<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>USA Road Trip Planner</title>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;600&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --blue:#1a73e8;--blue-lt:#e8f0fe;--blue-dk:#1557b0;
  --red:#ea4335;--green:#34a853;--yellow:#f9ab00;
  --surface:#fff;--bg:#f5f5f5;--divider:#e0e0e0;
  --t1:#202124;--t2:#5f6368;--t3:#9aa0a6;
  --topH:56px;--sideW:300px;--drawerW:380px;
}
html,body{height:100%;overflow:hidden;font-family:'Roboto',sans-serif;color:var(--t1);background:var(--bg);}

/* ══ TOPBAR ══ */
.topbar{
  position:fixed;top:0;left:0;right:0;height:var(--topH);
  background:var(--surface);box-shadow:0 1px 4px rgba(0,0,0,.15);
  display:flex;align-items:center;padding:0 16px;gap:12px;z-index:1000;
}
.logo{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.logo-icon{width:32px;height:32px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;font-size:16px;}
.logo-text{font-family:'Google Sans',sans-serif;font-size:17px;font-weight:500;white-space:nowrap;}
.logo-text span{color:var(--blue);}
.trip-name{font-family:'Google Sans',sans-serif;font-size:14px;color:var(--t2);cursor:pointer;padding:4px 8px;border-radius:4px;white-space:nowrap;max-width:180px;overflow:hidden;text-overflow:ellipsis;}
.trip-name:hover{background:var(--bg);}
.search-bar{flex:1;position:relative;max-width:420px;}
.search-bar input{width:100%;height:40px;border:1px solid var(--divider);border-radius:24px;background:var(--bg);padding:0 42px 0 18px;font-family:'Roboto',sans-serif;font-size:14px;color:var(--t1);outline:none;transition:all .2s;}
.search-bar input:focus{border-color:var(--blue);background:#fff;box-shadow:0 0 0 3px rgba(26,115,232,.12);}
.search-bar input::placeholder{color:var(--t3);}
.search-ico{position:absolute;right:13px;top:50%;transform:translateY(-50%);color:var(--t3);pointer-events:none;font-size:15px;}
.spacer{flex:1;}
.save-dot{width:8px;height:8px;border-radius:50%;background:var(--green);opacity:0;transition:opacity .3s;flex-shrink:0;}
.save-dot.on{opacity:1;}
.where-wrap{display:flex;align-items:center;gap:8px;flex-shrink:0;border:1px solid var(--divider);border-radius:24px;padding:0 14px;height:40px;background:var(--bg);transition:all .2s;}
.where-wrap:focus-within{border-color:var(--blue);background:#fff;box-shadow:0 0 0 3px rgba(26,115,232,.12);}
.where-lbl{font-size:12px;color:var(--t2);white-space:nowrap;}
.where-input{border:none;background:transparent;font-family:'Roboto',sans-serif;font-size:13px;color:var(--t1);outline:none;cursor:pointer;width:130px;}
.btn-add{display:flex;align-items:center;gap:6px;height:40px;padding:0 20px;background:var(--blue);color:white;border:none;border-radius:24px;font-family:'Google Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;flex-shrink:0;white-space:nowrap;transition:background .15s,box-shadow .15s;}
.btn-add:hover{background:var(--blue-dk);box-shadow:0 2px 8px rgba(0,0,0,.2);}

/* ══ SHELL — simple flex row, NO position:absolute children ══ */
.shell{
  position:fixed;top:var(--topH);left:0;right:0;bottom:0;
  display:flex;overflow:hidden;
}

/* ══ SIDEBAR ══ */
.sidebar{
  width:var(--sideW);flex-shrink:0;
  background:var(--surface);
  display:flex;flex-direction:column;
  border-right:1px solid var(--divider);
  box-shadow:2px 0 6px rgba(0,0,0,.07);
  z-index:50;  /* above map */
  position:relative;
}
.sth{padding:12px 14px 10px;border-bottom:1px solid var(--divider);flex-shrink:0;background:linear-gradient(135deg,#1a73e8,#1557b0);}
.sth-title{font-family:'Google Sans',sans-serif;font-size:15px;font-weight:500;color:white;margin-bottom:2px;}
.sth-sub{font-size:11px;color:rgba(255,255,255,.75);}
.sth-stats{display:flex;gap:10px;margin-top:8px;}
.sth-stat{font-size:11px;color:rgba(255,255,255,.9);background:rgba(255,255,255,.15);padding:3px 8px;border-radius:10px;}
.result-strip{display:none;flex-shrink:0;align-items:center;gap:10px;padding:9px 14px;background:var(--blue-lt);border-bottom:1px solid #c5d9f7;}
.result-strip.on{display:flex;}
.rs-body{flex:1;}
.rs-city{font-family:'Google Sans',sans-serif;font-size:13px;font-weight:500;color:var(--blue-dk);}
.rs-sub{font-size:11px;color:var(--blue);margin-top:1px;}
.rs-close{background:none;border:none;font-size:18px;color:var(--blue);cursor:pointer;}
.tl-scroll{flex:1;overflow-y:auto;padding:6px 0 24px;}
.tl-scroll::-webkit-scrollbar{width:4px;}
.tl-scroll::-webkit-scrollbar-thumb{background:#ddd;border-radius:2px;}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;text-align:center;}
.empty-ico{font-size:38px;margin-bottom:12px;opacity:.5;}
.empty-title{font-size:14px;font-weight:500;color:var(--t2);margin-bottom:6px;}
.empty-sub{font-size:12px;color:var(--t3);line-height:1.7;}

/* ── timeline cards ── */
.day-block{display:flex;padding:0 12px;cursor:pointer;}
.day-block:hover .day-content{background:#f8f9fa;border-radius:6px;}
.day-block.active .day-content{background:var(--blue-lt);border-radius:6px;}
.day-spine{width:24px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;}
.day-dot{width:12px;height:12px;border-radius:50%;margin-top:16px;flex-shrink:0;z-index:1;background:#4285f4;border:2px solid #fff;box-shadow:0 0 0 2px #4285f4;transition:transform .2s;}
.day-block.active .day-dot{transform:scale(1.3);background:var(--blue);box-shadow:0 0 0 2px var(--blue);}
.day-line{width:2px;flex:1;background:#ccc;min-height:16px;margin:3px 0;}
.day-block:last-child .day-line{background:transparent;}
.day-content{flex:1;padding:11px 8px 11px 10px;transition:background .15s;}
.day-date{font-size:11px;font-weight:500;color:var(--t2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px;}
.day-name{font-family:'Google Sans',sans-serif;font-size:15px;font-weight:500;color:var(--t1);line-height:1.3;margin-bottom:2px;}
.day-meta{font-size:11px;color:var(--t3);margin-bottom:3px;}
.day-evt-preview{font-size:11px;color:var(--t2);margin-bottom:2px;display:flex;align-items:center;gap:4px;}
.ep-time{color:var(--blue);font-weight:500;min-width:42px;flex-shrink:0;}
.no-map-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;color:var(--yellow);background:#fef9e7;border:1px solid #fde68a;border-radius:4px;padding:2px 6px;margin-bottom:3px;}
.day-btns{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px;}
.day-btn{font-size:11px;font-family:'Google Sans',sans-serif;font-weight:500;padding:3px 9px;border-radius:4px;border:none;cursor:pointer;transition:background .15s;}
.db-detail{background:var(--blue);color:white;}
.db-detail:hover{background:var(--blue-dk);}
.db-edit{background:#fef3e2;color:#e37400;}
.db-edit:hover{background:#fde3b8;}
.db-del{background:#fce8e6;color:var(--red);}
.db-del:hover{background:#f5c6c2;}

/* ══ DETAIL DRAWER — flex sibling, slides via width ══ */
.drawer{
  /* sits between sidebar and map in flex row */
  width:0;flex-shrink:0;overflow:hidden;
  background:var(--surface);
  display:flex;flex-direction:column;
  border-right:1px solid var(--divider);
  box-shadow:2px 0 12px rgba(0,0,0,.12);
  z-index:40;
  position:relative;
  transition:width .3s cubic-bezier(.4,0,.2,1);
}
.drawer.open{width:var(--drawerW);}

/* inner container keeps content at fixed width so it doesn't squash during animation */
.drawer-inner{
  width:var(--drawerW);flex-shrink:0;
  display:flex;flex-direction:column;
  height:100%;overflow:hidden;
}

.drawer-hd{
  padding:0 16px;height:56px;border-bottom:1px solid var(--divider);
  display:flex;align-items:center;gap:10px;flex-shrink:0;
  background:linear-gradient(135deg,#1a73e8,#1557b0);
}
.drawer-back{background:none;border:none;color:white;cursor:pointer;font-size:20px;padding:4px;border-radius:50%;transition:background .15s;line-height:1;flex-shrink:0;}
.drawer-back:hover{background:rgba(255,255,255,.2);}
.drawer-hd-info{flex:1;min-width:0;}
.drawer-city{font-family:'Google Sans',sans-serif;font-size:16px;font-weight:500;color:white;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.drawer-dates{font-size:11px;color:rgba(255,255,255,.8);}
.drawer-edit-btn{background:rgba(255,255,255,.2);border:none;color:white;cursor:pointer;font-size:12px;font-family:'Google Sans',sans-serif;font-weight:500;padding:5px 12px;border-radius:14px;white-space:nowrap;transition:background .15s;flex-shrink:0;}
.drawer-edit-btn:hover{background:rgba(255,255,255,.35);}
.drawer-body{flex:1;overflow-y:auto;}
.drawer-body::-webkit-scrollbar{width:4px;}
.drawer-body::-webkit-scrollbar-thumb{background:#ddd;border-radius:2px;}

/* meta strip */
.drawer-meta-strip{display:flex;border-bottom:1px solid var(--divider);}
.dms-item{flex:1;padding:10px 14px;display:flex;gap:8px;align-items:flex-start;}
.dms-item+.dms-item{border-left:1px solid var(--divider);}
.dms-ico{font-size:16px;flex-shrink:0;margin-top:1px;}
.dms-label{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.4px;color:var(--t3);margin-bottom:2px;}
.dms-val{font-size:13px;color:var(--t1);}

/* day sections */
.drawer-day-section{border-bottom:1px solid var(--divider);}
.drawer-day-header{display:flex;align-items:center;justify-content:space-between;padding:11px 16px 9px;background:#fafafa;user-select:none;}
.ddh-date{font-family:'Google Sans',sans-serif;font-size:13px;font-weight:500;color:var(--t1);}
.ddh-right{display:flex;align-items:center;gap:8px;}
.ddh-count{font-size:11px;color:var(--t3);}
.ddh-add{background:var(--blue-lt);color:var(--blue);border:none;cursor:pointer;font-size:11px;font-family:'Google Sans',sans-serif;font-weight:500;padding:3px 10px;border-radius:14px;transition:background .15s;}
.ddh-add:hover{background:#d2e3fc;}

/* events */
.evt-list{padding:4px 16px 8px;}
.evt-empty{font-size:12px;color:var(--t3);padding:6px 0;font-style:italic;}
.evt-item{display:flex;gap:10px;align-items:flex-start;padding:8px 0;border-bottom:1px solid #f5f5f5;position:relative;}
.evt-item:last-child{border-bottom:none;}
.evt-time-col{width:48px;flex-shrink:0;text-align:right;padding-top:2px;}
.evt-time{font-size:12px;font-weight:500;color:var(--blue);line-height:1.2;}
.evt-ampm{font-size:10px;color:var(--t3);}
.evt-dot-col{display:flex;flex-direction:column;align-items:center;padding-top:4px;flex-shrink:0;}
.evt-dot{width:8px;height:8px;border-radius:50%;background:var(--blue);border:2px solid white;box-shadow:0 0 0 1px var(--blue);flex-shrink:0;}
.evt-vline{width:1px;flex:1;background:#e0e0e0;min-height:12px;margin-top:3px;}
.evt-body{flex:1;min-width:0;}
.evt-name{font-size:14px;color:var(--t1);font-weight:500;margin-bottom:2px;line-height:1.3;}
.evt-note{font-size:12px;color:var(--t2);margin-bottom:6px;line-height:1.4;}
.evt-img-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;margin-bottom:2px;}
.evt-img-row::-webkit-scrollbar{height:3px;}
.evt-img-row::-webkit-scrollbar-thumb{background:#ddd;border-radius:2px;}
.evt-img{width:80px;height:56px;object-fit:cover;border-radius:6px;flex-shrink:0;cursor:pointer;transition:opacity .15s;}
.evt-img:hover{opacity:.82;}
.evt-img-skel{width:80px;height:56px;border-radius:6px;background:linear-gradient(90deg,#f0f0f0 25%,#e8e8e8 50%,#f0f0f0 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;flex-shrink:0;}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.evt-del{position:absolute;top:6px;right:0;background:none;border:none;cursor:pointer;color:var(--t3);font-size:13px;padding:2px 5px;border-radius:3px;opacity:0;transition:opacity .15s,color .15s;}
.evt-item:hover .evt-del{opacity:1;}
.evt-del:hover{color:var(--red);}

/* add event form */
.add-evt-form{display:none;flex-direction:column;gap:8px;margin:0 16px 12px;padding:12px;background:#f8f9fa;border-radius:8px;}
.add-evt-form.on{display:flex;}
.aef-row{display:flex;gap:8px;}
.aef-input{width:100%;border:1px solid var(--divider);border-radius:4px;padding:7px 10px;font-family:'Roboto',sans-serif;font-size:13px;color:var(--t1);outline:none;background:white;transition:border-color .2s;}
.aef-input:focus{border-color:var(--blue);}
.aef-time{width:110px;flex-shrink:0;}
.aef-name{flex:1;}
.aef-hint{font-size:11px;color:var(--t3);}
.aef-btns{display:flex;gap:6px;}
.aef-save{background:var(--blue);color:white;border:none;border-radius:4px;padding:6px 16px;font-family:'Google Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;}
.aef-cancel{background:none;color:var(--t2);border:none;border-radius:4px;padding:6px 10px;font-family:'Google Sans',sans-serif;font-size:13px;cursor:pointer;}

/* notes in drawer */
.drawer-notes{padding:12px 16px 16px;}
.dns-title{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.4px;color:var(--t3);margin-bottom:8px;display:flex;align-items:center;gap:8px;}
.dns-title::after{content:'';flex:1;height:1px;background:var(--divider);}
.note-chip{display:flex;align-items:flex-start;gap:8px;background:#f8f9fa;border-radius:6px;padding:8px 10px;margin-bottom:6px;}
.ntc{font-size:10px;font-weight:500;padding:2px 7px;border-radius:8px;white-space:nowrap;flex-shrink:0;margin-top:1px;}
.note-text{font-size:13px;color:var(--t1);flex:1;line-height:1.4;}
.nt-hotel{background:#e3f2fd;color:#1565c0;}
.nt-flight{background:#f3e5f5;color:#6a1b9a;}
.nt-activity{background:#e8f5e9;color:#2e7d32;}
.nt-restaurant{background:#fff3e0;color:#e65100;}
.nt-transport{background:#fce4ec;color:#880e4f;}
.nt-general{background:#f5f5f5;color:#424242;}

/* ══ MAP — takes remaining space ══ */
.map-area{flex:1;position:relative;min-width:0;}
#map{width:100%;height:100%;}

/* map card */
.map-card{position:absolute;bottom:24px;right:20px;z-index:400;background:white;border-radius:10px;box-shadow:0 4px 16px rgba(0,0,0,.18);padding:14px 18px;min-width:200px;display:none;animation:popUp .2s ease;}
.map-card.on{display:block;}
@keyframes popUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.mc-lbl{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.5px;color:var(--t3);margin-bottom:4px;}
.mc-city{font-family:'Google Sans',sans-serif;font-size:18px;font-weight:500;color:var(--t1);margin-bottom:2px;}
.mc-dates{font-size:12px;color:var(--t2);margin-bottom:4px;}
.mc-meta{font-size:12px;color:var(--t2);margin-bottom:4px;}
.mc-hr{height:1px;background:var(--divider);margin:8px 0;}
.mc-row{font-size:12px;color:var(--t2);display:flex;align-items:center;gap:5px;}
.mc-row strong{color:var(--t1);font-weight:500;}
.mc-btn{margin-top:10px;width:100%;background:var(--blue);color:white;border:none;border-radius:4px;padding:7px;font-family:'Google Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:background .15s;}
.mc-btn:hover{background:var(--blue-dk);}

.geo-status{position:absolute;top:10px;left:50%;transform:translateX(-50%);z-index:500;background:var(--t1);color:white;font-size:12px;padding:7px 16px;border-radius:20px;box-shadow:0 2px 8px rgba(0,0,0,.2);display:none;white-space:nowrap;align-items:center;gap:8px;}
.geo-status.on{display:flex;}
.spinner{width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--t1);color:white;font-size:13px;padding:10px 22px;border-radius:4px;box-shadow:0 4px 12px rgba(0,0,0,.2);opacity:0;pointer-events:none;z-index:9999;white-space:nowrap;transition:all .25s;}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0);}

/* ══ MODALS ══ */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:2000;display:none;align-items:center;justify-content:center;}
.overlay.on{display:flex;}
.modal{background:white;border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,.22);width:480px;max-width:96vw;max-height:92vh;overflow-y:auto;animation:scaleIn .15s ease;}
@keyframes scaleIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:none}}
.modal-hd{display:flex;align-items:center;justify-content:space-between;padding:20px 24px 16px;border-bottom:1px solid var(--divider);position:sticky;top:0;background:white;z-index:1;}
.modal-title{font-family:'Google Sans',sans-serif;font-size:18px;font-weight:500;}
.modal-x{width:32px;height:32px;border-radius:50%;border:none;background:none;cursor:pointer;font-size:20px;color:var(--t2);display:flex;align-items:center;justify-content:center;transition:background .15s;}
.modal-x:hover{background:var(--bg);}
.modal-body{padding:20px 24px;display:flex;flex-direction:column;gap:15px;}
.mf label{display:block;font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.4px;color:var(--t2);margin-bottom:6px;}
.mf input[type=text],.mf input[type=date],.mf textarea{width:100%;border:1px solid var(--divider);border-radius:4px;padding:9px 12px;font-family:'Roboto',sans-serif;font-size:14px;color:var(--t1);outline:none;background:white;transition:border-color .2s,box-shadow .2s;}
.mf input:focus,.mf textarea:focus{border-color:var(--blue);box-shadow:0 0 0 2px rgba(26,115,232,.15);}
.mf textarea{resize:vertical;min-height:60px;}
.mf-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.sec-lbl{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.5px;color:var(--t3);display:flex;align-items:center;gap:8px;}
.sec-lbl::after{content:'';flex:1;height:1px;background:var(--divider);}
.modal-ft{padding:12px 24px 20px;display:flex;justify-content:flex-end;gap:10px;border-top:1px solid var(--divider);}
.btn-cancel{height:36px;padding:0 16px;border:none;background:none;font-family:'Google Sans',sans-serif;font-size:14px;font-weight:500;color:var(--blue);cursor:pointer;border-radius:4px;transition:background .15s;}
.btn-cancel:hover{background:var(--blue-lt);}
.btn-ok{height:36px;padding:0 22px;border:none;background:var(--blue);color:white;font-family:'Google Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;border-radius:4px;transition:background .15s;}
.btn-ok:hover{background:var(--blue-dk);}
.note-types{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;}
.ntb{font-size:11px;font-family:'Google Sans',sans-serif;font-weight:500;padding:4px 12px;border-radius:14px;border:1px solid var(--divider);cursor:pointer;background:white;color:var(--t2);transition:all .15s;}
.ntb.on{background:var(--blue);color:white;border-color:var(--blue);}
.note-add-row{display:flex;gap:8px;align-items:flex-end;}
.note-add-row .mf{flex:1;margin:0;}
.note-add-row .mf textarea{min-height:48px;}
.note-add-btn{height:36px;padding:0 14px;background:var(--blue);color:white;border:none;border-radius:4px;font-family:'Google Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;flex-shrink:0;margin-bottom:1px;}
.notes-list{display:flex;flex-direction:column;gap:6px;margin-top:8px;}
.note-entry{display:flex;gap:8px;align-items:flex-start;background:#f8f9fa;border-radius:6px;padding:8px 10px;}
.note-del{background:none;border:none;cursor:pointer;color:var(--t3);font-size:14px;}
.note-del:hover{color:var(--red);}
.note-type-chip{font-size:10px;font-weight:500;padding:2px 7px;border-radius:8px;white-space:nowrap;flex-shrink:0;margin-top:1px;}

/* autocomplete */
.ac-wrap{position:relative;}
.ac-list{position:absolute;top:100%;left:0;right:0;background:white;border:1px solid var(--divider);border-top:none;border-radius:0 0 8px 8px;box-shadow:0 4px 12px rgba(0,0,0,.12);z-index:9999;max-height:200px;overflow-y:auto;display:none;}
.ac-list.on{display:block;}
.ac-item{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;transition:background .12s;border-bottom:1px solid #f5f5f5;}
.ac-item:last-child{border-bottom:none;}
.ac-item:hover,.ac-item.sel{background:var(--blue-lt);}
.ac-main{font-size:13px;font-weight:500;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ac-sub{font-size:11px;color:var(--t3);}
.ac-load{padding:12px 14px;font-size:12px;color:var(--t3);display:flex;align-items:center;gap:8px;}
.ac-spin{width:12px;height:12px;border:2px solid #ddd;border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;}

/* lightbox */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:5000;display:none;align-items:center;justify-content:center;}
.lightbox.on{display:flex;}
.lightbox img{max-width:90vw;max-height:88vh;border-radius:8px;box-shadow:0 8px 32px rgba(0,0,0,.5);}
.lb-close{position:absolute;top:16px;right:20px;background:none;border:none;color:white;font-size:32px;cursor:pointer;}

/* leaflet */
.gmpop .leaflet-popup-content-wrapper{border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.18);overflow:hidden;padding:0;}
.gmpop .leaflet-popup-content{margin:0;}
.pop-inner{padding:11px 15px;}
.pop-city{font-family:'Google Sans',sans-serif;font-size:14px;font-weight:500;color:var(--t1);margin-bottom:2px;}
.pop-dates{font-size:12px;color:var(--t2);}
.leaflet-control-attribution{font-size:9px!important;}
</style>
</head>
<body>

  <div class="spacer"></div>
  <div class="save-dot" id="saveDot" title="Saved"></div>

    <span class="where-lbl">📅 Where am I on</span>

  </div>
  <button class="btn-add" onclick="openStopModal('add')">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="12" y1="4" x2="12" y2="20"/><line x1="4" y1="12" x2="20" y2="12"/></svg> ADD
  </button>
</header>

  <!-- MIDDLE: Detail Drawer (flex sibling, width animates 0 → drawerW) -->

      <div class="drawer-hd">
        <button class="drawer-back" onclick="closeDrawer()">←</button>

          <div class="drawer-city"  id="dCity">—</div>
          <div class="drawer-dates" id="dDates">—</div>
        </div>

      </div>

    </div>
  </div>

  <!-- RIGHT: Map -->
  <div class="map-area">
    <div id="map"></div>
    <div class="map-card" id="mapCard">
      <div class="mc-lbl"  id="mcLbl">—</div>
      <div class="mc-city" id="mcCity">—</div>
      <div class="mc-dates" id="mcDates">—</div>

      <div class="mc-hr"></div>

    </div>

  </div>
</div>

<!-- STOP MODAL -->
<div class="overlay" id="stopOverlay">
  <div class="modal">
    <div class="modal-hd">
      <div class="modal-title" id="stopModalTitle">Add a Stop</div>
      <button class="modal-x" onclick="closeStopModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="mf"><label>Destination</label>
        <div class="ac-wrap">
          <input type="text" id="mLoc" placeholder="e.g. Yosemite, California" autocomplete="off"
            oninput="onLocInput(this.value)" onkeydown="onLocKey(event)"/>
          <div class="ac-list" id="acList"></div>
        </div>
      </div>
      <div class="mf-2">
        <div class="mf"><label>Arrival</label><input type="date" id="mArr" onchange="onArrChange()"/></div>
        <div class="mf"><label>Departure</label><input type="date" id="mDep"/></div>
      </div>
      <div class="mf-2">
        <div class="mf"><label>Stay / Accommodation</label><input type="text" id="mStay" placeholder="Airbnb, Hotel…"/></div>
        <div class="mf"><label>Main Activity</label><input type="text" id="mAct" placeholder="e.g. Hiking…"/></div>
      </div>
      <div class="sec-lbl">Notes</div>
      <div>
        <div class="note-types" id="noteTypes">
          <button class="ntb on" data-type="general"    onclick="selNT(this)">📝 General</button>
          <button class="ntb"    data-type="hotel"      onclick="selNT(this)">🏨 Hotel</button>
          <button class="ntb"    data-type="flight"     onclick="selNT(this)">✈️ Flight</button>
          <button class="ntb"    data-type="activity"   onclick="selNT(this)">🎯 Activity</button>
          <button class="ntb"    data-type="restaurant" onclick="selNT(this)">🍽️ Restaurant</button>
          <button class="ntb"    data-type="transport"  onclick="selNT(this)">🚌 Transport</button>
        </div>
        <div class="note-add-row">
          <div class="mf"><textarea id="mNoteText" placeholder="Add a note…"></textarea></div>
          <button class="note-add-btn" onclick="addNote()">Add</button>
        </div>
        <div class="notes-list" id="notesList"></div>
      </div>
    </div>
    <div class="modal-ft">
      <button class="btn-cancel" onclick="closeStopModal()">Cancel</button>
      <button class="btn-ok" id="btnOk" onclick="saveStop()">Add to Itinerary</button>
    </div>
  </div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lb-close" onclick="closeLightbox()">×</button>
  <img id="lbImg" src="" alt=""/>
</div>

<div class="toast" id="toast"></div>

let acTimer=null, acSel=-1, acRes=[];

/* ════════════ STORAGE ════════════ */
function save(){
  try{localStorage.setItem(STORAGE_KEY,JSON.stringify({tripName,stops}));flashSave();}
  catch(e){console.warn('Save failed',e);}
}
function load(){
  try{
    const raw=localStorage.getItem(STORAGE_KEY);
    if(!raw) return false;
    const d=JSON.parse(raw);
    tripName=d.tripName||DEFAULT_TRIP;
    stops=(d.stops||[]).map(s=>({
      ...s,
      notes:   s.notes   ||[],
      events:  s.events  ||[],
      stay:    s.stay    ||'',
      activity:s.activity||'',
    }));
    stops.sort((a,b)=>a.arrival.localeCompare(b.arrival));
    return stops.length>0;
  }catch(e){return false;}
}
function flashSave(){
  const d=document.getElementById('saveDot');
  d.classList.add('on');clearTimeout(d._t);
  d._t=setTimeout(()=>d.classList.remove('on'),1500);
}

/* ════════════ MAP ════════════ */
map=L.map('map',{zoomControl:true}).setView([37,-100],5);
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{
  attribution:'© <a href="https://openstreetmap.org">OSM</a> © <a href="https://carto.com">CARTO</a>',maxZoom:19
}).addTo(map);

function mkIcon(idx,active){
  const c=COLORS[idx%COLORS.length],s=active?34:26;
  return L.divIcon({className:'',
    html:`<div style="width:${s}px;height:${s}px;position:relative">
      <div style="width:${s}px;height:${s}px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);
        background:${c};border:2.5px solid #fff;
        box-shadow:${active?'0 3px 12px rgba(0,0,0,.35)':'0 2px 6px rgba(0,0,0,.22)'}"></div>
      <div style="position:absolute;top:47%;left:50%;transform:translate(-48%,-52%);
        font-size:${active?12:10}px;font-weight:700;color:#fff;
        font-family:'Google Sans',sans-serif;line-height:1">${idx+1}</div>
    </div>`,iconSize:[s,s],iconAnchor:[s/2,s],popupAnchor:[0,-s]});
}
function placeMarker(stop){
  if(MK[stop.id])map.removeLayer(MK[stop.id]);
  const i=stops.findIndex(s=>s.id===stop.id);
  const m=L.marker([stop.lat,stop.lng],{icon:mkIcon(i,false)}).addTo(map)
    .bindPopup(`<div class="pop-inner"><div class="pop-city">${stop.location}</div><div class="pop-dates">${fmtRange(stop.arrival,stop.departure)}</div></div>`,
      {className:'gmpop',closeButton:false});
  m.on('click',()=>setActive(stop.id,false));
  MK[stop.id]=m;
}
function refreshIcons(){stops.forEach((s,i)=>{if(MK[s.id])MK[s.id].setIcon(mkIcon(i,s.id===activeId));});}
function drawRoute(){
  if(routeLine){map.removeLayer(routeLine);routeLine=null;}
  const geo=stops.filter(s=>s.mapped);
  if(geo.length<2)return;
  routeLine=L.polyline(geo.map(s=>[s.lat,s.lng]),{color:'#4285f4',weight:3,opacity:.5,dashArray:'8 10'}).addTo(map);
}
// Notify leaflet whenever drawer opens/closes so it re-sizes correctly
function invalidateMap(){setTimeout(()=>map.invalidateSize(),320);}

/* ════════════ AUTOCOMPLETE ════════════ */
function onLocInput(v){
  selGeo=null;clearTimeout(acTimer);
  const l=document.getElementById('acList');
  if(v.length<2){l.classList.remove('on');l.innerHTML='';return;}
  acTimer=setTimeout(()=>fetchAc(v),300);
}
async function fetchAc(q){
  const l=document.getElementById('acList');
  l.innerHTML=`<div class="ac-load"><div class="ac-spin"></div> Searching…</div>`;l.classList.add('on');
  try{
    const r=await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}&limit=6&addressdetails=1`,
      {headers:{'Accept-Language':'en'},signal:AbortSignal.timeout(5000)});
    acRes=await r.json();acSel=-1;renderAc(acRes);
  }catch(e){l.innerHTML=`<div class="ac-load">Could not fetch suggestions</div>`;}
}
function renderAc(res){
  const l=document.getElementById('acList');
  if(!res.length){l.innerHTML=`<div class="ac-load">No results found</div>`;return;}
  l.innerHTML=res.map((r,i)=>{
    const a=r.address||{};
    const main=a.city||a.town||a.village||a.county||a.state||r.name||r.display_name.split(',')[0];
    const parts=[];if(a.state)parts.push(a.state);if(a.country)parts.push(a.country);
    const sub=parts.join(', ')||r.display_name.split(',').slice(1,3).join(',').trim();
    return`<div class="ac-item" onclick="selAc(${i})"><span style="font-size:14px">📍</span>
      <div><div class="ac-main">${main}</div><div class="ac-sub">${sub}</div></div></div>`;
  }).join('');l.classList.add('on');
}
function selAc(i){
  const r=acRes[i];if(!r)return;
  const a=r.address||{};
  const main=a.city||a.town||a.village||a.county||a.state||r.name||r.display_name.split(',')[0];
  const parts=[];if(a.state)parts.push(a.state);if(a.country)parts.push(a.country);
  const dn=parts.length?`${main}, ${parts.join(', ')}`:main;
  document.getElementById('mLoc').value=dn;selGeo={lat:+r.lat,lng:+r.lon,displayName:dn};closeAc();
}
function closeAc(){const l=document.getElementById('acList');l.classList.remove('on');l.innerHTML='';acRes=[];acSel=-1;}
function onLocKey(e){
  const items=document.querySelectorAll('.ac-item');
  if(e.key==='ArrowDown'){e.preventDefault();acSel=Math.min(acSel+1,items.length-1);items.forEach((el,i)=>el.classList.toggle('sel',i===acSel));}
  else if(e.key==='ArrowUp'){e.preventDefault();acSel=Math.max(acSel-1,0);items.forEach((el,i)=>el.classList.toggle('sel',i===acSel));}
  else if(e.key==='Enter'){e.preventDefault();if(acSel>=0&&acSel<acRes.length)selAc(acSel);else closeAc();}
  else if(e.key==='Escape')closeAc();
}
document.addEventListener('click',e=>{if(!e.target.closest('.ac-wrap'))closeAc();});
function onArrChange(){
  const arr=document.getElementById('mArr').value,dep=document.getElementById('mDep');
  if(arr){dep.min=arr;if(dep.value&&dep.value<arr)dep.value=arr;dep.focus();}
}

/* ════════════ NOTES ════════════ */
function selNT(btn){document.querySelectorAll('.ntb').forEach(b=>b.classList.remove('on'));btn.classList.add('on');selNoteType=btn.dataset.type;}
function addNote(){
  const txt=document.getElementById('mNoteText').value.trim();if(!txt)return;
  pendingNotes.push({id:Date.now(),type:selNoteType,text:txt});
  document.getElementById('mNoteText').value='';renderNotesList();
}
function removeNote(id){pendingNotes=pendingNotes.filter(n=>n.id!==id);renderNotesList();}
function renderNotesList(){
  document.getElementById('notesList').innerHTML=pendingNotes.map(n=>{
    const m=NOTE_META[n.type]||NOTE_META.general;
    return`<div class="note-entry"><span class="note-type-chip ${m.cls}">${m.emoji} ${m.label}</span><span style="flex:1;font-size:13px;color:var(--t1)">${n.text}</span><button class="note-del" onclick="removeNote(${n.id})">✕</button></div>`;
  }).join('');
}

/* ════════════ STOP MODAL ════════════ */
function openStopModal(mode,stopId){
  editingId=mode==='edit'?stopId:null;pendingNotes=[];selGeo=null;
  document.getElementById('stopModalTitle').textContent=mode==='edit'?'Edit Stop':'Add a Stop';
  document.getElementById('btnOk').textContent=mode==='edit'?'Save Changes':'Add to Itinerary';
  document.querySelectorAll('.ntb').forEach(b=>b.classList.toggle('on',b.dataset.type==='general'));selNoteType='general';
  if(mode==='edit'&&stopId){
    const s=stops.find(x=>x.id===stopId);if(!s)return;
    document.getElementById('mLoc').value=s.location;
    document.getElementById('mArr').value=s.arrival;
    document.getElementById('mDep').value=s.departure;
    document.getElementById('mDep').min=s.arrival;
    document.getElementById('mStay').value=s.stay||'';
    document.getElementById('mAct').value=s.activity||'';
    pendingNotes=s.notes?[...s.notes]:[];
    if(s.lat)selGeo={lat:s.lat,lng:s.lng,displayName:s.location};
  }else{
    document.getElementById('mLoc').value=document.getElementById('topSearch').value.trim();
    ['mArr','mDep','mStay','mAct'].forEach(id=>{const el=document.getElementById(id);el.value='';if(id==='mDep')el.min='';});
  }
  document.getElementById('mNoteText').value='';renderNotesList();closeAc();
  document.getElementById('stopOverlay').classList.add('on');
  setTimeout(()=>document.getElementById('mLoc').focus(),80);
}
function closeStopModal(){document.getElementById('stopOverlay').classList.remove('on');closeAc();editingId=null;}
document.getElementById('stopOverlay').addEventListener('click',e=>{if(e.target===document.getElementById('stopOverlay'))closeStopModal();});

/* ════════════ SAVE STOP ════════════ */
async function saveStop(){
  const locVal=document.getElementById('mLoc').value.trim();
  const arr=document.getElementById('mArr').value;
  const dep=document.getElementById('mDep').value;
  const stay=document.getElementById('mStay').value.trim();
  const act=document.getElementById('mAct').value.trim();
  if(!locVal)return toast('Please enter a destination.');
  if(!arr)return toast('Please select an arrival date.');
  if(dep&&dep<arr)return toast('Departure must be after arrival.');

  if(editingId){
    const s=stops.find(x=>x.id===editingId);if(!s)return closeStopModal();
    s.location=locVal;s.arrival=arr;s.departure=dep||arr;s.stay=stay;s.activity=act;s.notes=[...pendingNotes];
    if(selGeo&&(selGeo.lat!==s.lat||selGeo.lng!==s.lng)){
      s.lat=selGeo.lat;s.lng=selGeo.lng;s.mapped=true;
      if(MK[s.id]){map.removeLayer(MK[s.id]);delete MK[s.id];}placeMarker(s);
    }else if(!s.mapped&&!selGeo)geocodeBg(s);
    stops.sort((a,b)=>a.arrival.localeCompare(b.arrival));
    closeStopModal();drawRoute();refreshIcons();renderTimeline();setActive(s.id,s.mapped);
    if(drawerStopId===s.id)openDrawer(s.id);
    save();updateSidebarHeader();toast(`✏️ ${s.location} updated`);
  }else{
    const stop={id:Date.now(),location:locVal,lat:null,lng:null,mapped:false,
      arrival:arr,departure:dep||arr,stay,activity:act,notes:[...pendingNotes],events:[]};
    if(selGeo){stop.lat=selGeo.lat;stop.lng=selGeo.lng;stop.mapped=true;}
    stops.push(stop);stops.sort((a,b)=>a.arrival.localeCompare(b.arrival));
    document.getElementById('topSearch').value='';
    closeStopModal();
    if(stop.mapped){placeMarker(stop);drawRoute();}
    refreshIcons();renderTimeline();setActive(stop.id,false);
    if(stop.mapped){map.flyTo([stop.lat,stop.lng],Math.max(map.getZoom(),9),{duration:1.1});updateMapCard(stop);toast(`📍 ${stop.location} added`);}
    else{toast(`📍 ${stop.location} added — locating on map…`);geocodeBg(stop);}
    save();updateSidebarHeader();
  }
}

async function geocodeBg(stop){
  document.getElementById('geoStatus').classList.add('on');
  try{
    const r=await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(stop.location)}&limit=1`,
      {headers:{'Accept-Language':'en'},signal:AbortSignal.timeout(6000)});
    const d=await r.json();
    if(d.length){stop.lat=+d[0].lat;stop.lng=+d[0].lon;stop.mapped=true;placeMarker(stop);drawRoute();refreshIcons();renderTimeline();
      if(activeId===stop.id){map.flyTo([stop.lat,stop.lng],Math.max(map.getZoom(),9),{duration:1.1});updateMapCard(stop);}save();}
    else{stop.mapped=false;renderTimeline();toast(`⚠ Couldn't locate "${stop.location}"`);}
  }catch(e){stop.mapped=false;renderTimeline();}
  document.getElementById('geoStatus').classList.remove('on');
}

/* ════════════ SET ACTIVE ════════════ */
function setActive(id,fly){
  activeId=id;const s=stops.find(x=>x.id===id);if(!s)return;
  refreshIcons();
  if(s.mapped){
    if(fly)map.flyTo([s.lat,s.lng],Math.max(map.getZoom(),9),{duration:1.1});
    else map.panTo([s.lat,s.lng]);
    MK[id]?.openPopup();updateMapCard(s);
  }
  renderTimeline();
  setTimeout(()=>{const el=document.querySelector(`.day-block[data-id="${id}"]`);if(el)el.scrollIntoView({behavior:'smooth',block:'nearest'});},60);
}
function updateMapCard(s){
  const i=stops.findIndex(x=>x.id===s.id);
  document.getElementById('mcLbl').textContent=`Stop ${i+1} of ${stops.length}`;
  document.getElementById('mcCity').textContent=s.location;
  document.getElementById('mcDates').textContent=fmtRange(s.arrival,s.departure);
  const mm=document.getElementById('mcMeta');
  const parts=[];if(s.stay)parts.push('🏨 '+s.stay);if(s.activity)parts.push('🎯 '+s.activity);
  if(parts.length){mm.textContent=parts.join(' · ');mm.style.display='block';}else mm.style.display='none';
  document.getElementById('mcNights').textContent=nightsBetween(s.arrival,s.departure);
  document.getElementById('mapCard').classList.add('on');
}
function removeStop(id){
  if(MK[id]){map.removeLayer(MK[id]);delete MK[id];}
  stops=stops.filter(s=>s.id!==id);
  if(activeId===id)activeId=stops.length?stops[0].id:null;
  if(drawerStopId===id)closeDrawer();
  renderTimeline();drawRoute();refreshIcons();
  if(activeId)setActive(activeId,false);
  else{document.getElementById('mapCard').classList.remove('on');if(!stops.length)map.setView([37,-100],5);}
  updateSidebarHeader();save();
}
function focusStop(id){const s=stops.find(x=>x.id===id);if(s&&s.mapped){setActive(id,true);map.flyTo([s.lat,s.lng],13,{duration:1.2});}else toast('Still locating on map.');}

/* ════════════ DRAWER ════════════ */
function openDrawer(id){
  const s=stops.find(x=>x.id===id);if(!s)return;
  drawerStopId=id;
  document.getElementById('dCity').textContent=s.location;
  document.getElementById('dDates').textContent=fmtRange(s.arrival,s.departure)+(s.stay?' · '+s.stay:'');
  renderDrawerBody(s);
  document.getElementById('drawer').classList.add('open');
  invalidateMap();
  setActive(id,true);
}
function closeDrawer(){
  document.getElementById('drawer').classList.remove('open');
  drawerStopId=null;invalidateMap();
}
function openDrawerForActive(){if(activeId)openDrawer(activeId);}
function editCurrentStop(){if(drawerStopId)openStopModal('edit',drawerStopId);}

function renderDrawerBody(s){
  const body=document.getElementById('drawerBody');
  let html='';

  // meta strip
  if(s.stay||s.activity){
    html+=`<div class="drawer-meta-strip">`;
    if(s.stay)html+=`<div class="dms-item"><div class="dms-ico">🏨</div><div class="dms-body"><div class="dms-label">Stay</div><div class="dms-val">${s.stay}</div></div></div>`;
    if(s.activity)html+=`<div class="dms-item"><div class="dms-ico">🎯</div><div class="dms-body"><div class="dms-label">Activity</div><div class="dms-val">${s.activity}</div></div></div>`;
    html+=`</div>`;
  }

  // days
  const days=daysInRange(s.arrival,s.departure);
  days.forEach(dateStr=>{
    const dayEvts=(s.events||[]).filter(e=>e.date===dateStr).sort((a,b)=>a.time.localeCompare(b.time));
    const fid=`aef-${s.id}-${dateStr.replace(/-/g,'')}`;
    const listId=`evtlist-${s.id}-${dateStr.replace(/-/g,'')}`;
    html+=`
    <div class="drawer-day-section">
      <div class="drawer-day-header">
        <div class="ddh-date">${fmtDateLong(dateStr)}</div>
        <div class="ddh-right">
          <span class="ddh-count">${dayEvts.length} event${dayEvts.length!==1?'s':''}</span>
          <button class="ddh-add" onclick="showAddEvt('${fid}','${s.id}','${dateStr}')">+ Add</button>
        </div>
      </div>
      <div class="evt-list" id="${listId}">`;

    if(!dayEvts.length){
      html+=`<div class="evt-empty">No events — click + Add to plan your day</div>`;
    }else{
      dayEvts.forEach((ev,ei)=>{
        const[h,m]=ev.time.split(':');const hr=+h,ampm=hr>=12?'PM':'AM',h12=hr%12||12;
        const isLast=ei===dayEvts.length-1;
        html+=`
        <div class="evt-item" id="evt-${ev.id}">
          <div class="evt-time-col"><div class="evt-time">${h12}:${m}</div><div class="evt-ampm">${ampm}</div></div>
          <div class="evt-dot-col"><div class="evt-dot"></div>${!isLast?'<div class="evt-vline"></div>':''}</div>
          <div class="evt-body">
            <div class="evt-name">${ev.name}</div>
            ${ev.note?`<div class="evt-note">${ev.note}</div>`:''}
            <div class="evt-img-row" id="imgs-${ev.id}">
              <div class="evt-img-skel"></div><div class="evt-img-skel"></div>
            </div>
          </div>
          <button class="evt-del" onclick="deleteEvt(${s.id},${ev.id})" title="Remove">✕</button>
        </div>`;
      });
    }
    html+=`</div>
      <div class="add-evt-form" id="${fid}">
        <div class="aef-row">
          <input type="time" class="aef-input aef-time" id="${fid}-time" value="09:00"/>
          <input type="text" class="aef-input aef-name" id="${fid}-name" placeholder="Event name (e.g. Bridalveil Fall)"
            onkeydown="if(event.key==='Enter')saveEvt('${s.id}','${dateStr}','${fid}')"/>
        </div>
        <input type="text" class="aef-input" id="${fid}-note" placeholder="Note (optional)"
          onkeydown="if(event.key==='Enter')saveEvt('${s.id}','${dateStr}','${fid}')"/>
        <div class="aef-hint">💡 Photos of landmarks auto-load from Wikipedia</div>
        <div class="aef-btns">
          <button class="aef-save"   onclick="saveEvt('${s.id}','${dateStr}','${fid}')">Save</button>
          <button class="aef-cancel" onclick="hideAddEvt('${fid}')">Cancel</button>
        </div>
      </div>
    </div>`;
  });

  // notes
  if(s.notes&&s.notes.length){
    html+=`<div class="drawer-notes"><div class="dns-title">Notes</div>`;
    s.notes.forEach(n=>{
      const m=NOTE_META[n.type]||NOTE_META.general;
      html+=`<div class="note-chip"><span class="ntc ${m.cls}">${m.emoji} ${m.label}</span><span class="note-text">${n.text}</span></div>`;
    });
    html+=`</div>`;
  }

  body.innerHTML=html;

  // load images async
  (s.events||[]).forEach(ev=>loadEvtImages(ev.id,ev.name));
}

function daysInRange(start,end){
  const days=[];let d=new Date(start+'T12:00:00');const e=new Date(end+'T12:00:00');
  while(d<=e){days.push(d.toISOString().split('T')[0]);d.setDate(d.getDate()+1);}
  return days;
}

/* ── Event CRUD ── */
function showAddEvt(fid,stopId,dateStr){
  // close any other open forms
  document.querySelectorAll('.add-evt-form.on').forEach(f=>{if(f.id!==fid)f.classList.remove('on');});
  const f=document.getElementById(fid);if(!f)return;
  f.classList.toggle('on');
  if(f.classList.contains('on'))setTimeout(()=>document.getElementById(`${fid}-name`)?.focus(),50);
}
function hideAddEvt(fid){const f=document.getElementById(fid);if(f)f.classList.remove('on');}

function saveEvt(stopId,dateStr,fid){
  const sid=+stopId;const s=stops.find(x=>x.id===sid);if(!s)return;
  const time=document.getElementById(`${fid}-time`).value||'09:00';
  const name=document.getElementById(`${fid}-name`).value.trim();
  const note=document.getElementById(`${fid}-note`).value.trim();
  if(!name)return toast('Please enter an event name.');
  if(!s.events)s.events=[];
  const evId=Date.now();
  s.events.push({id:evId,date:dateStr,time,name,note});
  s.events.sort((a,b)=>a.date===b.date?a.time.localeCompare(b.time):a.date.localeCompare(b.date));
  save();hideAddEvt(fid);renderDrawerBody(s);renderTimeline();toast(`✓ "${name}" added`);
}

function deleteEvt(stopId,evId){
  const s=stops.find(x=>x.id===+stopId);if(!s)return;
  s.events=(s.events||[]).filter(e=>e.id!==evId);
  save();renderDrawerBody(s);renderTimeline();
}

/* ── Images ── */
async function loadEvtImages(evId,query){
  const row=document.getElementById(`imgs-${evId}`);if(!row)return;
  if(imgCache[query]){renderImgs(row,imgCache[query]);return;}
  try{
    const url=`https://en.wikipedia.org/w/api.php?action=query&titles=${encodeURIComponent(query)}&prop=pageimages&pithumbsize=300&format=json&origin=*`;
    const r=await fetch(url);const d=await r.json();
    const pages=d.query?.pages||{};const imgs=[];
    Object.values(pages).forEach(p=>{if(p.thumbnail?.source)imgs.push(p.thumbnail.source);});
    if(imgs.length<2){
      const url2=`https://en.wikipedia.org/w/api.php?action=query&titles=${encodeURIComponent(query)}&prop=images&imlimit=4&format=json&origin=*`;
      const r2=await fetch(url2);const d2=await r2.json();
      const pages2=d2.query?.pages||{};const titles=[];
      Object.values(pages2).forEach(p=>(p.images||[]).slice(0,3).forEach(img=>{
        if(!img.title.match(/\.svg|logo|icon|flag|map/i))titles.push(img.title);
      }));
      for(const t of titles.slice(0,2)){
        if(imgs.length>=3)break;
        try{
          const ru=`https://en.wikipedia.org/w/api.php?action=query&titles=${encodeURIComponent(t)}&prop=imageinfo&iiprop=url&iiurlwidth=300&format=json&origin=*`;
          const rr=await fetch(ru);const dd=await rr.json();
          Object.values(dd.query?.pages||{}).forEach(p=>{const u=(p.imageinfo||[])[0]?.thumburl;if(u)imgs.push(u);});
        }catch(e){}
      }
    }
    imgCache[query]=imgs;
    const rowNow=document.getElementById(`imgs-${evId}`);if(rowNow)renderImgs(rowNow,imgs);
  }catch(e){const rowNow=document.getElementById(`imgs-${evId}`);if(rowNow)rowNow.innerHTML='';}
}
function renderImgs(row,imgs){
  if(!imgs||!imgs.length){row.innerHTML='';return;}
  row.innerHTML=imgs.slice(0,4).map(src=>
    `<img class="evt-img" src="${src}" alt="" loading="lazy" onclick="openLightbox('${src}')" onerror="this.style.display='none'"/>`
  ).join('');
}
function openLightbox(src){document.getElementById('lbImg').src=src;document.getElementById('lightbox').classList.add('on');}
function closeLightbox(){document.getElementById('lightbox').classList.remove('on');document.getElementById('lbImg').src='';}

/* ════════════ TIMELINE ════════════ */
function renderTimeline(){
  const list=document.getElementById('tlList'),empty=document.getElementById('emptyState');
  if(!stops.length){empty.style.display='flex';list.innerHTML='';return;}
  empty.style.display='none';list.innerHTML='';
  stops.forEach((s,i)=>{
    const n=nightsBetween(s.arrival,s.departure),act=s.id===activeId;
    const prev=(s.events||[]).slice(0,2);
    const prevHtml=prev.map(e=>{
      const[h,m]=e.time.split(':');const hr=+h,ampm=hr>=12?'PM':'AM',h12=hr%12||12;
      return`<div class="day-evt-preview"><span class="ep-time">${h12}:${m}${ampm}</span>${e.name}</div>`;
    }).join('');
    const moreN=(s.events||[]).length-prev.length;
    const div=document.createElement('div');
    div.className=`day-block${act?' active':''}`;div.dataset.id=s.id;
    div.innerHTML=`
      <div class="day-spine"><div class="day-dot"></div><div class="day-line"></div></div>
      <div class="day-content" onclick="setActive(${s.id},true)">
        <div class="day-date">${fmtDate(s.arrival)}</div>
        <div class="day-name">${s.location}</div>
        ${n>0?`<div class="day-meta">${n} night${n!==1?'s':''}${s.departure!==s.arrival?' · until '+fmtDate(s.departure):''}</div>`:''}
        ${s.stay?`<div class="day-meta">🏨 ${s.stay}</div>`:''}
        ${!s.mapped?`<div class="no-map-badge">⏳ Locating…</div>`:''}
        ${prevHtml}
        ${moreN>0?`<div class="day-meta" style="color:var(--blue)">+${moreN} more…</div>`:''}
        <div class="day-btns">
          <button class="day-btn db-detail" onclick="openDrawer(${s.id});event.stopPropagation()">📋 Details</button>
          <button class="day-btn db-edit"   onclick="openStopModal('edit',${s.id});event.stopPropagation()">✏ Edit</button>
          <button class="day-btn db-del"    onclick="removeStop(${s.id});event.stopPropagation()">Remove</button>
        </div>
      </div>`;
    list.appendChild(div);
  });
}

/* ════════════ SIDEBAR HEADER ════════════ */
function updateSidebarHeader(){
  const name=tripName||DEFAULT_TRIP;
  document.getElementById('tripNameEl').textContent=name;
  document.getElementById('sthTitle').textContent=name;
  if(!stops.length){['sthSub','sthStops','sthDays'].forEach(id=>document.getElementById(id).textContent='');return;}
  const first=stops[0].arrival,last=stops[stops.length-1].departure||stops[stops.length-1].arrival;
  const days=Math.max(1,Math.round((new Date(last)-new Date(first))/86400000)+1);
  document.getElementById('sthSub').textContent=`${fmtDate(first)} – ${fmtDate(last)}`;
  document.getElementById('sthStops').textContent=`${stops.length} stop${stops.length!==1?'s':''}`;
  document.getElementById('sthDays').textContent=`${days} day${days!==1?'s':''}`;
}
function renameTripPrompt(){const n=prompt('Rename your trip:',tripName);if(n&&n.trim()){tripName=n.trim();updateSidebarHeader();save();}}

/* ════════════ SCROLL → MAP ════════════ */
const tlScroll=document.getElementById('tlScroll');let scrollTimer;
tlScroll.addEventListener('scroll',()=>{
  clearTimeout(scrollTimer);scrollTimer=setTimeout(()=>{
    const rect=tlScroll.getBoundingClientRect(),midY=rect.top+rect.height/2;
    let best=null,bestD=Infinity;
    tlScroll.querySelectorAll('.day-block').forEach(c=>{
      const cr=c.getBoundingClientRect(),d=Math.abs(cr.top+cr.height/2-midY);
      if(d<bestD){bestD=d;best=c;}
    });
    if(best){
      const id=+best.dataset.id;
      if(id!==activeId){
        activeId=id;const s=stops.find(x=>x.id===id);
        if(s&&s.mapped){map.panTo([s.lat,s.lng],{animate:true,duration:.7});MK[id]?.openPopup();updateMapCard(s);}
        refreshIcons();
        tlScroll.querySelectorAll('.day-block').forEach(c=>c.classList.toggle('active',+c.dataset.id===id));
      }
    }
  },70);
});

/* ════════════ DATE FINDER ════════════ */
function findLocation(date){
  const strip=document.getElementById('resultStrip');
  if(!date||!stops.length){strip.classList.remove('on');return;}
  const found=stops.find(s=>date>=s.arrival&&date<=s.departure);
  if(found){document.getElementById('rsCity').textContent=found.location;document.getElementById('rsSub').textContent=`${fmtDate(date)} · ${fmtRange(found.arrival,found.departure)}`;strip.classList.add('on');setActive(found.id,true);}
  else{document.getElementById('rsCity').textContent='Not scheduled';document.getElementById('rsSub').textContent=`No stop on ${fmtDate(date)}`;strip.classList.add('on');}
}
function closeStrip(){document.getElementById('resultStrip').classList.remove('on');document.getElementById('finderDate').value='';}

/* ════════════ UTILS ════════════ */
const MO=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const DOW=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
function fmtDate(d){if(!d)return'—';const[y,m,day]=d.split('-');return`${MO[+m-1]} ${+day}, ${y}`;}
function fmtDateLong(d){if(!d)return'—';const dt=new Date(d+'T12:00:00');return`${DOW[dt.getDay()]}, ${MO[dt.getMonth()]} ${dt.getDate()}`;}
function fmtRange(a,b){
  if(!a)return'—';if(!b||a===b)return fmtDate(a);
  const[ay,am,ad]=a.split('-'),[by,bm,bd]=b.split('-');
  if(ay===by&&am===bm)return`${MO[+am-1]} ${+ad}–${+bd}, ${ay}`;
  if(ay===by)return`${MO[+am-1]} ${+ad} – ${MO[+bm-1]} ${+bd}, ${ay}`;
  return`${fmtDate(a)} – ${fmtDate(b)}`;
}
function nightsBetween(a,b){return!a||!b?0:Math.max(0,Math.round((new Date(b)-new Date(a))/86400000));}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),3000);}
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeStopModal();closeLightbox();}});
window.addEventListener('resize',()=>map.invalidateSize());

/* ════════════ BOOT ════════════ */
(function boot(){
  // wipe any old storage keys from previous versions so defaults always show clean
  ['tripplanner_v2','tripplanner_v3'].forEach(k=>localStorage.removeItem(k));

  const loaded=load();
  if(!loaded){
    stops=DEFAULT_STOPS.map(s=>({...s,events:(s.events||[]).map(e=>({...e}))}));
    tripName=DEFAULT_TRIP;
  }
  stops.sort((a,b)=>a.arrival.localeCompare(b.arrival));
  save();

  updateSidebarHeader();
  stops.forEach(s=>{if(s.mapped&&s.lat)placeMarker(s);});
  refreshIcons();drawRoute();
  renderTimeline();  // ← always called, stops.length > 0 guaranteed with defaults

  const geo=stops.filter(s=>s.mapped);
  if(geo.length>1)map.fitBounds(L.latLngBounds(geo.map(s=>[s.lat,s.lng])),{padding:[40,40]});
  else if(geo.length===1)map.setView([geo[0].lat,geo[0].lng],9);

  if(stops.length)setActive(stops[0].id,false);
})();
</script>
